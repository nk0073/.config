# ~/.config/picom/picom.conf
# xcompmgr-like picom config

backend = "xrender";
vsync = false;

shadow = false;
fading = false;

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

detect-client-opacity = true;

# Let fullscreen games bypass picom when possible.
unredir-if-possible = true;
unredir-if-possible-delay = 0;

blur: {
  method = "none";
};

# OLD-style rules only. Do not use rules = (...).
opacity-rule = [
  "100:class_g = 'steam_app_570'",
  "100:class_g = 'steam_app_730'",
  "100:class_g = 'Dota 2'",
  "100:class_g = 'cs2'",
  "100:name *?= 'Dota 2'",
  "100:name *?= 'Counter-Strike 2'"
];
